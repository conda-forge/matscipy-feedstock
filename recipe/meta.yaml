{% set name = "matscipy" %}
{% set version = "1.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/matscipy-{{ version }}.tar.gz
  sha256: 1d0691be7e541357ec7a3363e1ed2d7289e5ef8942fbc94064567124d1fb7444
  patches:
    - version.patch  # [linux]
    - numpy.patch

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
    - ninja
  host:
    - python
    - python-build
    - meson >=1.0.0
    - meson-python >=0.13.0
    - numpy
    - pip
  run:
    - python
    - numpy >=1.16.0
    - scipy >=1.2.3
    - ase >=3.16.0
    - looseversion

test:
  imports:
    - matscipy
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/libAtoms/matscipy
  license: LGPL-2.1-or-later
  license_family: GPL
  license_file: LICENSE
  summary: Materials science with Python at the atomic-scale
  description: |
    This repository contains generic Python materials science tools built 
    around the Atomic Simulation Environment (ASE).
  doc_url: https://github.com/libAtoms/matscipy
  dev_url: https://github.com/libAtoms/matscipy

extra:
  recipe-maintainers:
    - jan-janssen
